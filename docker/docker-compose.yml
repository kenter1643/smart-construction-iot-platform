version: '3.8'

services:
  # PostgreSQL - 关系型数据库
  postgres:
    image: postgres:15
    container_name: smart-iot-postgres
    environment:
      POSTGRES_USER: smartiot
      POSTGRES_PASSWORD: smartiot123
      POSTGRES_DB: smartiot
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartiot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-iot-network

  # InfluxDB - 时间序列数据库
  influxdb:
    image: influxdb:2.7
    container_name: smart-iot-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: smartiot
      DOCKER_INFLUXDB_INIT_PASSWORD: smartiot123
      DOCKER_INFLUXDB_INIT_ORG: smart-construction
      DOCKER_INFLUXDB_INIT_BUCKET: sensor-data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-auth-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    ports:
      - "8086:8086"
    networks:
      - smart-iot-network

  # RabbitMQ with MQTT plugin - 消息代理
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: smart-iot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: smartiot
      RABBITMQ_DEFAULT_PASS: smartiot123
      RABBITMQ_DEFAULT_VHOST: /smartiot
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
      - "1883:1883"    # MQTT
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_mqtt &&
             rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-iot-network

  # Kafka - 实时数据流处理
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smart-iot-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - smart-iot-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smart-iot-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - smart-iot-network

  # Redis - 缓存和会话存储
  redis:
    image: redis:7-alpine
    container_name: smart-iot-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - smart-iot-network

volumes:
  postgres-data:
  influxdb-data:
  influxdb-config:
  rabbitmq-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  redis-data:

networks:
  smart-iot-network:
    driver: bridge
