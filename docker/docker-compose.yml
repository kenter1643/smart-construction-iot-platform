version: '3.8'

services:
  # MySQL - 关系型数据库
  mysql:
    image: mysql:8.4
    container_name: smart-iot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smartiot
      MYSQL_USER: smartiot
      MYSQL_PASSWORD: smartiot123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-iot-network

  # InfluxDB - 时间序列数据库
  influxdb:
    image: influxdb:2.7
    container_name: smart-iot-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: smartiot
      DOCKER_INFLUXDB_INIT_PASSWORD: smartiot123
      DOCKER_INFLUXDB_INIT_ORG: smart-construction
      DOCKER_INFLUXDB_INIT_BUCKET: sensor-data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-auth-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    ports:
      - "8086:8086"
    networks:
      - smart-iot-network

  # RabbitMQ with MQTT plugin - 消息代理
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: smart-iot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: smartiot
      RABBITMQ_DEFAULT_PASS: smartiot123
      RABBITMQ_DEFAULT_VHOST: /smartiot
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
      - "1883:1883"    # MQTT
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_mqtt &&
             rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-iot-network

  # Kafka - 实时数据流处理
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smart-iot-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - smart-iot-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smart-iot-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - smart-iot-network

  # Redis - 缓存和会话存储
  redis:
    image: redis:7-alpine
    container_name: smart-iot-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - smart-iot-network

  # Rust 设备管理服务
  device-management-rs:
    build:
      context: ../backend/services/device-management-rs
      dockerfile: Dockerfile
    container_name: smart-iot-device-management-rs
    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_started
    environment:
      RUST_LOG: info
      PORT: 3003
      MYSQL_URL: mysql://smartiot:smartiot123@mysql:3306/smartiot
      INFLUX_URL: http://influxdb:8086
      INFLUX_ORG: smart-construction
      INFLUX_BUCKET: sensor-data
      INFLUX_TOKEN: my-super-secret-auth-token
    ports:
      - "3003:3003"
    networks:
      - smart-iot-network

  # 数据存储与分析服务
  data-storage:
    build:
      context: ../backend/services/data-storage
      dockerfile: Dockerfile
    container_name: smart-iot-data-storage
    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3002
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: smartiot
      MYSQL_PASSWORD: smartiot123
      MYSQL_DATABASE: smartiot
      INFLUX_HOST: influxdb
      INFLUX_PORT: 8086
      INFLUX_DATABASE: sensor-data
      INFLUX_USER: smartiot
      INFLUX_PASSWORD: smartiot123
    ports:
      - "3002:3002"
    networks:
      - smart-iot-network

  # 告警与通知服务
  alerts-notifications:
    build:
      context: ../backend/services/alerts-notifications
      dockerfile: Dockerfile
    container_name: smart-iot-alerts-notifications
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3004
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: smartiot
      MYSQL_PASSWORD: smartiot123
      MYSQL_DATABASE: smartiot
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: no-reply@smartconstruction.com
      SMTP_PASS: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_PHONE_NUMBER: ""
    ports:
      - "3004:3004"
    networks:
      - smart-iot-network

  # 用户认证服务
  user-auth:
    build:
      context: ../backend/services/user-auth
      dockerfile: Dockerfile
    container_name: smart-iot-user-auth
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3005
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: smartiot
      MYSQL_PASSWORD: smartiot123
      MYSQL_DATABASE: smartiot
      JWT_SECRET: my-super-secret-jwt-key
      JWT_EXPIRES_IN: 24h
    ports:
      - "3005:3005"
    networks:
      - smart-iot-network

volumes:
  mysql-data:
  influxdb-data:
  influxdb-config:
  rabbitmq-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  redis-data:

networks:
  smart-iot-network:
    driver: bridge
