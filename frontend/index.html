<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧工地物联网平台 - 设备管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&amp;family=Fira+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-shell: #0f172a;
            --bg-sidebar: #172033;
            --bg-main: #eef3f8;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #dc2626;
            --text: #172033;
            --muted: #64748b;
            --muted-strong: #475569;
            --border: #dbe3ee;
            --sidebar-text: #cbd5e1;
            --sidebar-muted: #94a3b8;
            --shadow-card: 0 14px 34px rgba(15, 23, 42, 0.08);
            --shadow-modal: 0 24px 70px rgba(15, 23, 42, 0.26);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 14px;
            --space-lg: 20px;
            --space-xl: 28px;
            --transition: 180ms ease;
        }

        * {
            box-sizing: border-box;
        }

        html {
            color-scheme: light;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Fira Sans', sans-serif;
            line-height: 1.5;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 30%),
                linear-gradient(180deg, var(--bg-shell) 0 120px, var(--bg-main) 120px 100%);
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            border: 0;
            background: none;
            color: inherit;
            padding: 0;
        }

        .icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .toast-container {
            position: fixed;
            right: var(--space-xl);
            bottom: var(--space-xl);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .app-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 284px minmax(0, 1fr);
        }

        .sidebar {
            position: sticky;
            top: 0;
            align-self: start;
            height: 100vh;
            padding: var(--space-xl) var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-xl);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 28%), var(--bg-sidebar);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--sidebar-text);
        }

        .sidebar-header {
            padding-bottom: var(--space-lg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .brand-mark {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            color: #fff;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .sidebar-brand h1 {
            margin: 0;
            color: #fff;
            font-size: 1.08rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .sidebar-brand p {
            margin: 4px 0 0;
            color: var(--sidebar-muted);
            font-size: 0.82rem;
        }

        .sidebar-nav {
            display: grid;
            gap: var(--space-sm);
        }

        .nav-item {
            width: 100%;
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: 12px 14px;
            border-radius: var(--radius-md);
            color: var(--sidebar-text);
            cursor: pointer;
            text-align: left;
            transition: background-color var(--transition), color var(--transition), transform var(--transition);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.96), rgba(29, 78, 216, 0.98));
            color: #fff;
            box-shadow: 0 10px 28px rgba(37, 99, 235, 0.24);
        }

        .nav-item-icon {
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .sidebar-footer {
            margin-top: auto;
        }

        .api-status {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: 12px 14px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.88rem;
            color: var(--sidebar-text);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--success);
            box-shadow: 0 0 0 6px rgba(22, 163, 74, 0.18);
        }

        .status-dot.disconnected {
            background: var(--danger);
            box-shadow: 0 0 0 6px rgba(220, 38, 38, 0.16);
        }

        .workspace {
            min-width: 0;
            padding: var(--space-xl);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-lg);
            padding: 18px 22px;
            margin-bottom: var(--space-xl);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(219, 227, 238, 0.75);
            border-radius: 24px;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(12px);
        }

        .topbar-eyebrow {
            margin: 0 0 4px;
            color: var(--primary);
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .topbar-title h2 {
            margin: 0;
            color: var(--text);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .topbar-title p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .page-content {
            padding-bottom: var(--space-xl);
        }

        .page-header {
            margin-bottom: var(--space-lg);
        }

        .page-title {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-lg);
            margin-bottom: var(--space-sm);
        }

        .page-title h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .page-description {
            margin: 0;
            color: var(--muted);
            font-size: 0.96rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-xl);
        }

        .stat-card {
            display: flex;
            gap: var(--space-lg);
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.11);
        }

        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .stat-icon.blue { background: rgba(37, 99, 235, 0.11); color: var(--primary); }
        .stat-icon.green { background: rgba(22, 163, 74, 0.12); color: var(--success); }
        .stat-icon.yellow { background: rgba(245, 158, 11, 0.16); color: var(--warning); }
        .stat-icon.red { background: rgba(220, 38, 38, 0.12); color: var(--danger); }

        .stat-content h3 {
            margin: 0 0 4px;
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.85rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .stat-trend {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            margin-top: var(--space-sm);
            font-size: 0.85rem;
            color: var(--muted-strong);
        }

        .stat-trend.up { color: var(--success); }
        .stat-trend.down { color: var(--danger); }

        .card {
            margin-bottom: var(--space-lg);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-md);
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.98), rgba(255, 255, 255, 0.98));
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .card-title h2 {
            margin: 0;
            font-size: 1.08rem;
            font-weight: 700;
            color: var(--text);
        }

        .card-actions {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: transform var(--transition), background-color var(--transition), border-color var(--transition), color var(--transition), box-shadow var(--transition);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface-soft);
            border-color: rgba(37, 99, 235, 0.35);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .btn-danger:hover {
            background: #b91c1c;
            border-color: #b91c1c;
        }

        .btn-sm {
            padding: 9px 12px;
            font-size: 0.82rem;
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--space-lg);
        }

        .form-group {
            margin-bottom: var(--space-lg);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--space-sm);
            color: var(--text);
            font-weight: 600;
            font-size: 0.88rem;
        }

        .form-control {
            width: 100%;
            min-height: 44px;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text);
            transition: border-color var(--transition), box-shadow var(--transition), background-color var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: rgba(37, 99, 235, 0.55);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        select.form-control {
            cursor: pointer;
        }

        .search-filter-bar {
            display: grid;
            grid-template-columns: minmax(0, 2fr) repeat(3, minmax(0, 1fr)) auto;
            gap: var(--space-md);
            align-items: end;
            margin-bottom: var(--space-lg);
        }

        .search-input-wrapper {
            position: relative;
        }

        .search-input-wrapper .form-control {
            padding-left: 44px;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        .device-table-container {
            overflow-x: auto;
        }

        .device-table {
            width: 100%;
            border-collapse: collapse;
        }

        .device-table thead {
            background: var(--surface-soft);
        }

        .device-table th,
        .device-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        .device-table th {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .device-table td {
            font-size: 0.94rem;
            color: var(--text);
        }

        .device-table tbody tr {
            background: var(--surface);
            transition: background-color var(--transition);
        }

        .device-table tbody tr:hover {
            background: #f8fbff;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .status-badge.online {
            background: rgba(22, 163, 74, 0.12);
            color: var(--success);
        }

        .status-badge.offline {
            background: rgba(220, 38, 38, 0.12);
            color: var(--danger);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: var(--space-xl);
            background: rgba(15, 23, 42, 0.52);
            backdrop-filter: blur(6px);
            z-index: 2000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            width: min(560px, 100%);
            max-height: 90vh;
            overflow: hidden;
            border-radius: 20px;
            background: var(--surface);
            box-shadow: var(--shadow-modal);
            border: 1px solid rgba(219, 227, 238, 0.85);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-md);
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface-soft);
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: var(--muted);
            cursor: pointer;
            transition: background-color var(--transition), color var(--transition), transform var(--transition);
        }

        .modal-close:hover {
            background: #e2e8f0;
            color: var(--text);
            transform: translateY(-1px);
        }

        .modal-body {
            max-height: 60vh;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--space-md);
            padding: 18px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface-soft);
        }

        .empty-state {
            padding: var(--space-xl);
            text-align: center;
            color: var(--muted);
        }

        .empty-state-icon {
            width: 68px;
            height: 68px;
            margin: 0 auto var(--space-lg);
            border-radius: 20px;
            display: grid;
            place-items: center;
            background: #edf2f7;
            color: var(--muted);
        }

        .empty-state h3 {
            margin: 0 0 6px;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-xl);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            border: 3px solid #dbe3ee;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: var(--space-md);
            color: var(--muted);
        }

        .toast {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            min-width: 280px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.98);
            box-shadow: var(--shadow-card);
            animation: toastIn 220ms ease-out;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            color: var(--muted-strong);
            flex-shrink: 0;
        }

        .toast.success .toast-icon {
            color: var(--success);
        }

        .toast.error .toast-icon {
            color: var(--danger);
        }

        .device-actions {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
        }

        .readonly-field {
            background: var(--surface-soft);
        }

        .nav-item:focus-visible,
        .btn:focus-visible,
        .form-control:focus-visible,
        .modal-close:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.28);
            outline-offset: 2px;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(219, 227, 238, 0.45);
        }

        ::-webkit-scrollbar-thumb {
            background: #b8c4d3;
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 1120px) {
            .app-shell {
                grid-template-columns: 248px minmax(0, 1fr);
            }

            .sidebar {
                width: 248px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .search-filter-bar {
                grid-template-columns: minmax(0, 1fr) repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 820px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .workspace {
                padding: 16px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .search-filter-bar {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .modal-overlay {
                padding: 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>

    <svg aria-hidden="true" focusable="false" width="0" height="0" style="position:absolute; left:-9999px; overflow:hidden;">
        <symbol id="icon-brand" viewBox="0 0 24 24">
            <path d="M4 9.5 12 4l8 5.5-8 5.5z"></path>
            <path d="M6 11.2V16l6 4 6-4v-4.8"></path>
            <path d="M12 9.5V20"></path>
        </symbol>
        <symbol id="icon-dashboard" viewBox="0 0 24 24">
            <rect x="3.5" y="4" width="17" height="16" rx="3"></rect>
            <path d="M7 8h10"></path>
            <path d="M7 12h10"></path>
            <path d="M7 16h6"></path>
        </symbol>
        <symbol id="icon-devices" viewBox="0 0 24 24">
            <rect x="4" y="6" width="8" height="12" rx="2"></rect>
            <rect x="14" y="4" width="6" height="16" rx="2"></rect>
            <path d="M7 10h2"></path>
            <path d="M16 8h2"></path>
            <path d="M16 12h2"></path>
        </symbol>
        <symbol id="icon-video" viewBox="0 0 24 24">
            <rect x="3.5" y="6" width="12" height="12" rx="2"></rect>
            <path d="m15.5 10 5-3v10l-5-3z"></path>
        </symbol>
        <symbol id="icon-alert" viewBox="0 0 24 24">
            <path d="M12 4 3.5 19h17z"></path>
            <path d="M12 9v4"></path>
            <path d="M12 16h.01"></path>
        </symbol>
        <symbol id="icon-analytics" viewBox="0 0 24 24">
            <path d="M4 19h16"></path>
            <path d="M7 16v-6"></path>
            <path d="M12 16V8"></path>
            <path d="M17 16v-3"></path>

    <script>
        const API_BASE = 'http://localhost:3001/api/v1';
        const HEALTH_CHECK_URL = 'http://localhost:3001/health';
        let allDevices = [];

        function getTypeLabel(type) {
            const labels = {
                sensor: '传感器',
                camera: '摄像头',
                actuator: '执行器',
                controller: '控制器'
            };
            return labels[type] || type;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getToastIcon(type) {
            const iconId = type === 'success' ? '#icon-check' : '#icon-x';
            return `<svg class="icon toast-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="${iconId}"></use></svg>`;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.setAttribute('role', 'status');
            toast.insertAdjacentHTML('beforeend', getToastIcon(type));
            const text = document.createElement('span');
            text.textContent = message;
            toast.appendChild(text);
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeIn 200ms ease-out reverse';
                setTimeout(() => {
                    if (container.contains(toast)) {
                        container.removeChild(toast);
                    }
                }, 200);
            }, 3000);
        }

        async function checkApiStatus() {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            try {
                const response = await fetch(HEALTH_CHECK_URL);
                const data = await response.json();

                if (data.success) {
                    statusDot.classList.remove('disconnected');
                    statusText.textContent = `${data.data.mode}模式 - 已连接`;
                } else {
                    throw new Error('API response error');
                }
            } catch (error) {
                statusDot.classList.add('disconnected');
                statusText.textContent = '未连接';
                console.error('API connection failed:', error);
            }
        }

        async function fetchDevices() {
            const tbody = document.getElementById('device-table-body');
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align: center;">
                        <div class="loading">
                            <div class="spinner"></div>
                            <div class="loading-text">加载中...</div>
                        </div>
                    </td>
                </tr>
            `;

            try {
                const response = await fetch(`${API_BASE}/devices`);
                const data = await response.json();
                allDevices = data.data.devices;
                applyFilters();
                updateStats(allDevices);
            } catch (error) {
                console.error('Failed to fetch devices:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center;">
                            <div class="empty-state">
                                <div class="empty-state-icon" aria-hidden="true">
                                    <svg class="icon" viewBox="0 0 24 24"><use href="#icon-box"></use></svg>
                                </div>
                                <h3>获取设备列表失败</h3>
                                <p>请确保后端服务运行在 http://localhost:3001</p>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        function updateStats(devices) {
            const totalDevices = devices.length;
            const onlineDevices = devices.filter((d) => d.status === 'online').length;
            const offlineDevices = devices.filter((d) => d.status === 'offline').length;
            const alerts = offlineDevices;

            document.getElementById('total-devices').textContent = totalDevices;
            document.getElementById('online-devices').textContent = onlineDevices;
            document.getElementById('offline-devices').textContent = offlineDevices;
            document.getElementById('alerts').textContent = alerts;

            document.querySelectorAll('.stat-value').forEach((el) => {
                el.style.animation = 'none';
                el.offsetHeight;
                el.style.animation = 'fadeIn 200ms ease-out';
            });
        }

        function renderDevices(devices) {
            const tbody = document.getElementById('device-table-body');

            if (devices.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center;">
                            <div class="empty-state">
                                <div class="empty-state-icon" aria-hidden="true">
                                    <svg class="icon" viewBox="0 0 24 24"><use href="#icon-box"></use></svg>
                                </div>
                                <h3>暂无设备</h3>
                                <p>使用右上角的“添加设备”按钮添加新设备</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = devices.map((device) => {
                const safeName = escapeHtml(device.name);
                const safeDeviceId = escapeHtml(device.deviceId);
                const safeTypeLabel = escapeHtml(getTypeLabel(device.type));
                const safeProtocol = escapeHtml(device.protocol);
                const statusClass = device.status === 'online' ? 'online' : 'offline';
                const safeStatusLabel = escapeHtml(device.status === 'online' ? '在线' : '离线');
                const numericId = Number(device.id);
                const hasSafeId = Number.isFinite(numericId);
                const editButton = hasSafeId
                    ? `<button type="button" class="btn btn-primary btn-sm" onclick="editDevice(${numericId})">
                                    <svg class="icon" viewBox="0 0 24 24"><use href="#icon-edit"></use></svg>
                                    <span>编辑</span>
                                </button>`
                    : `<button type="button" class="btn btn-primary btn-sm" disabled aria-disabled="true" title="无效设备 ID">
                                    <svg class="icon" viewBox="0 0 24 24"><use href="#icon-edit"></use></svg>
                                    <span>编辑</span>
                                </button>`;
                const deleteButton = hasSafeId
                    ? `<button type="button" class="btn btn-danger btn-sm" onclick="deleteDevice(${numericId})">
                                    <svg class="icon" viewBox="0 0 24 24"><use href="#icon-trash"></use></svg>
                                    <span>删除</span>
                                </button>`
                    : `<button type="button" class="btn btn-danger btn-sm" disabled aria-disabled="true" title="无效设备 ID">
                                    <svg class="icon" viewBox="0 0 24 24"><use href="#icon-trash"></use></svg>
                                    <span>删除</span>
                                </button>`;

                return `
                    <tr>
                        <td>
                            <div style="font-weight: 500;">${safeName}</div>
                        </td>
                        <td>
                            <code style="font-family: 'Fira Code', monospace; font-size: 0.875rem; color: var(--muted);">${safeDeviceId}</code>
                        </td>
                        <td>
                            <span style="display: inline-block; padding: var(--space-xs) var(--space-sm); background: var(--surface-soft); border-radius: var(--radius-sm); font-size: 0.8125rem; color: var(--muted);">${safeTypeLabel}</span>
                        </td>
                        <td>
                            <span style="display: inline-block; padding: var(--space-xs) var(--space-sm); background: var(--surface-soft); border-radius: var(--radius-sm); font-size: 0.8125rem; color: var(--muted);">${safeProtocol}</span>
                        </td>
                        <td>
                            <span class="status-badge ${statusClass}">
                                ${safeStatusLabel}
                            </span>
                        </td>
                        <td>
                            <div class="device-actions">
                                ${editButton}
                                ${deleteButton}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const filterType = document.getElementById('filter-type').value;
            const filterProtocol = document.getElementById('filter-protocol').value;
            const filterStatus = document.getElementById('filter-status').value;

            const filteredDevices = allDevices.filter((device) => {
                const matchesSearch = !searchTerm ||
                    device.name.toLowerCase().includes(searchTerm) ||
                    device.deviceId.toLowerCase().includes(searchTerm);
                const matchesType = !filterType || device.type === filterType;
                const matchesProtocol = !filterProtocol || device.protocol === filterProtocol;
                const matchesStatus = !filterStatus || device.status === filterStatus;

                return matchesSearch && matchesType && matchesProtocol && matchesStatus;
            });

            renderDevices(filteredDevices);
            updateStats(filteredDevices);
        }

        function searchDevices() {
            applyFilters();
        }

        function resetFilters() {
            document.getElementById('search').value = '';
            document.getElementById('filter-type').value = '';
            document.getElementById('filter-protocol').value = '';
            document.getElementById('filter-status').value = '';
            applyFilters();
        }

        function openAddDeviceModal() {
            document.getElementById('add-device-modal').classList.add('show');
        }

        function closeAddDeviceModal() {
            document.getElementById('add-device-modal').classList.remove('show');
        }

        async function saveAddDevice() {
            const deviceData = {
                deviceId: document.getElementById('add-deviceId').value,
                name: document.getElementById('add-name').value,
                type: document.getElementById('add-type').value,
                protocol: document.getElementById('add-protocol').value,
                status: document.getElementById('add-status').value
            };

            if (!deviceData.deviceId || !deviceData.name || !deviceData.type || !deviceData.protocol) {
                showToast('请填写所有必填项', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/devices`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(deviceData)
                });

                if (response.ok) {
                    closeAddDeviceModal();
                    fetchDevices();
                    showToast('设备添加成功');
                } else {
                    const data = await response.json();
                    showToast(`添加失败：${data.details}`, 'error');
                }
            } catch (error) {
                console.error('Failed to add device:', error);
                showToast('添加设备失败，请检查网络连接', 'error');
            }
        }

        let currentEditId = null;

        async function editDevice(id) {
            try {
                const response = await fetch(`${API_BASE}/devices/${id}`);
                const data = await response.json();
                const device = data.data;

                currentEditId = id;
                document.getElementById('edit-id').value = device.id;
                document.getElementById('edit-deviceId').value = device.deviceId;
                document.getElementById('edit-name').value = device.name;
                document.getElementById('edit-type').value = device.type;
                document.getElementById('edit-protocol').value = device.protocol;
                document.getElementById('edit-status').value = device.status;

                document.getElementById('edit-modal').classList.add('show');
            } catch (error) {
                console.error('Failed to get device:', error);
                showToast('获取设备信息失败', 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('show');
            currentEditId = null;
        }

        async function saveEditDevice() {
            const deviceData = {
                deviceId: document.getElementById('edit-deviceId').value,
                name: document.getElementById('edit-name').value,
                type: document.getElementById('edit-type').value,
                protocol: document.getElementById('edit-protocol').value,
                status: document.getElementById('edit-status').value
            };

            try {
                const response = await fetch(`${API_BASE}/devices/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(deviceData)
                });

                if (response.ok) {
                    closeEditModal();
                    fetchDevices();
                    showToast('设备更新成功');
                } else {
                    const data = await response.json();
                    showToast(`更新失败：${data.details}`, 'error');
                }
            } catch (error) {
                console.error('Failed to update device:', error);
                showToast('更新设备失败，请检查网络连接', 'error');
            }
        }

        async function deleteDevice(id) {
            if (!confirm('确定要删除这个设备吗？此操作不可撤销。')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/devices/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchDevices();
                    showToast('设备删除成功');
                } else {
                    const data = await response.json();
                    showToast(`删除失败：${data.details}`, 'error');
                }
            } catch (error) {
                console.error('Failed to delete device:', error);
                showToast('删除设备失败，请检查网络连接', 'error');
            }
        }

        document.getElementById('add-device-modal').addEventListener('click', (e) => {
            if (e.target.id === 'add-device-modal') {
                closeAddDeviceModal();
            }
        });

        document.getElementById('edit-modal').addEventListener('click', (e) => {
            if (e.target.id === 'edit-modal') {
                closeEditModal();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            checkApiStatus();
            fetchDevices();
            setInterval(checkApiStatus, 30000);
        });
    </script>
</body>
</html>
