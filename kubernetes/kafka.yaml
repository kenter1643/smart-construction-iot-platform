apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-iot-zookeeper
  namespace: smart-iot
  labels:
    app: smart-iot-zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-iot-zookeeper
  template:
    metadata:
      labels:
        app: smart-iot-zookeeper
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.5.0
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
        ports:
        - containerPort: 2181
        volumeMounts:
        - mountPath: /var/lib/zookeeper/data
          name: zookeeper-data
        - mountPath: /var/lib/zookeeper/log
          name: zookeeper-logs
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          tcpSocket:
            port: 2181
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 2181
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
      volumes:
      - name: zookeeper-data
        persistentVolumeClaim:
          claimName: smart-iot-zookeeper-data-pvc
      - name: zookeeper-logs
        persistentVolumeClaim:
          claimName: smart-iot-zookeeper-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: smart-iot-zookeeper
  namespace: smart-iot
  labels:
    app: smart-iot-zookeeper
spec:
  type: ClusterIP
  selector:
    app: smart-iot-zookeeper
  ports:
  - protocol: TCP
    port: 2181
    targetPort: 2181
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-iot-kafka
  namespace: smart-iot
  labels:
    app: smart-iot-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-iot-kafka
  template:
    metadata:
      labels:
        app: smart-iot-kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.5.0
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "smart-iot-zookeeper:2181"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://smart-iot-kafka:9092,PLAINTEXT_HOST://localhost:29092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        ports:
        - containerPort: 9092
        - containerPort: 29092
        volumeMounts:
        - mountPath: /var/lib/kafka/data
          name: kafka-storage
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["kafka-topics", "--list", "--bootstrap-server", "localhost:9092"]
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["kafka-topics", "--list", "--bootstrap-server", "localhost:9092"]
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: kafka-storage
        persistentVolumeClaim:
          claimName: smart-iot-kafka-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: smart-iot-kafka
  namespace: smart-iot
  labels:
    app: smart-iot-kafka
spec:
  type: ClusterIP
  selector:
    app: smart-iot-kafka
  ports:
  - name: kafka
    protocol: TCP
    port: 9092
    targetPort: 9092
  - name: kafka-host
    protocol: TCP
    port: 29092
    targetPort: 29092
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smart-iot-zookeeper-data-pvc
  namespace: smart-iot
  labels:
    app: smart-iot-zookeeper
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smart-iot-zookeeper-logs-pvc
  namespace: smart-iot
  labels:
    app: smart-iot-zookeeper
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smart-iot-kafka-pvc
  namespace: smart-iot
  labels:
    app: smart-iot-kafka
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
