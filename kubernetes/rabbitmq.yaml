apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-iot-rabbitmq
  namespace: smart-iot
  labels:
    app: smart-iot-rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-iot-rabbitmq
  template:
    metadata:
      labels:
        app: smart-iot-rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3.12-management
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: smartiot
        - name: RABBITMQ_DEFAULT_PASS
          value: smartiot123
        - name: RABBITMQ_DEFAULT_VHOST
          value: /smartiot
        ports:
        - containerPort: 5672  # AMQP
        - containerPort: 15672 # Management UI
        - containerPort: 1883  # MQTT
        volumeMounts:
        - mountPath: /var/lib/rabbitmq
          name: rabbitmq-storage
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        lifecycle:
          postStart:
            exec:
              command: ["sh", "-c", "rabbitmq-plugins enable rabbitmq_mqtt"]
      volumes:
      - name: rabbitmq-storage
        persistentVolumeClaim:
          claimName: smart-iot-rabbitmq-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: smart-iot-rabbitmq
  namespace: smart-iot
  labels:
    app: smart-iot-rabbitmq
spec:
  type: ClusterIP
  selector:
    app: smart-iot-rabbitmq
  ports:
  - name: amqp
    protocol: TCP
    port: 5672
    targetPort: 5672
  - name: management
    protocol: TCP
    port: 15672
    targetPort: 15672
  - name: mqtt
    protocol: TCP
    port: 1883
    targetPort: 1883
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smart-iot-rabbitmq-pvc
  namespace: smart-iot
  labels:
    app: smart-iot-rabbitmq
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
